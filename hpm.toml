[package]
path = "tumblehead/tumblepipe"
name = "TumblePipe"
version = "1.1.23"
description = "A small studio pipeline for animation and VFX projects in Houdini"
documentation = "https://tumblepipe.readthedocs.io"
readme = "README.md"
keywords = ["houdini"]

[houdini]
min_version = "21"
# Capped at the highest Houdini major the CI matrix builds a resolver for —
# see resolver-src/houdini_majors.toml. Bump in lockstep when adding a new
# major, otherwise users on the new major would install cleanly and then
# hit a runtime failure when USD's plugin registry can't find a matching
# resolver/houdini<major>/ tree.
max_version = "22"

[env]
TH_PIPELINE_PATH = { method = "set", value = "$HPM_PACKAGE_ROOT" }
ASSET_BROWSER_CATALOG_PATH = { method = "prepend", value = "$HPM_PACKAGE_ROOT/asset_browser_catalogs" }
TH_PROJECT_PATH = { method = "set", value = "" }
TH_CONFIG_PATH = { method = "set", value = "" }
TH_EXPORT_PATH = { method = "set", value = "" }
OCIO = { method = "set", value = "$HPM_PACKAGE_ROOT/ocio/tumblehead.ocio" }

# tumbleResolver registration. Houdini applies these env edits during its
# package-loading phase, *before* USD's Plug.Registry first-touches — that's
# the only timing that works in-process (Plug.Registry is a one-shot
# scanner; pythonrc.py runs too late). PATH / LD_LIBRARY_PATH /
# DYLD_LIBRARY_PATH cover the OS-specific dynamic linker so it can load
# the resolver shared library that plugInfo.json points at.
#
# Two layers of variable expansion:
#   - $HPM_PACKAGE_ROOT is consumed by hpm at pack time and rewritten to
#     a Houdini-side reference to the package install dir.
#   - $HOUDINI_MAJOR_RELEASE passes through hpm verbatim and is expanded
#     by Houdini's package loader at startup, so a single value per
#     variable routes H21 to resolver/houdini21/ and H22 to
#     resolver/houdini22/ off the same archive.
PXR_PLUGINPATH_NAME = { method = "prepend", value = "$HPM_PACKAGE_ROOT/resolver/houdini$HOUDINI_MAJOR_RELEASE/tumbleResolver/resources" }
PATH = { method = "prepend", value = "$HPM_PACKAGE_ROOT/resolver/houdini$HOUDINI_MAJOR_RELEASE/tumbleResolver/lib" }
LD_LIBRARY_PATH = { method = "prepend", value = "$HPM_PACKAGE_ROOT/resolver/houdini$HOUDINI_MAJOR_RELEASE/tumbleResolver/lib" }
DYLD_LIBRARY_PATH = { method = "prepend", value = "$HPM_PACKAGE_ROOT/resolver/houdini$HOUDINI_MAJOR_RELEASE/tumbleResolver/lib" }

[python_dependencies]
qtpy = ">=2.4.0"
watchdog = ">=6.0.0"
pymongo = ">=4.13.0"
dictdiffer = ">=0.9.0"

[native]
# hpm only accepts a fixed set of platform names. For mac we ship an
# arm64-only binary but label the native slot as macos-universal so it
# passes hpm's validator. Per-platform CI workers only build their own
# platform's binaries into resolver/houdini<major>/, so each archive
# carries exactly that platform's resolver. linux + windows archives
# carry both H21 and H22 builds; the macOS x86_64 archive carries H21
# only (SideFX dropped x86_64 macos at H22, so the build worker has
# no H22 toolkit to link against — see resolver-src/houdini_majors.toml).
#
# The identical globs across platforms below are deliberate: with
# hpm >= 0.9.1, a path that matches the target platform's own
# `files` glob is included even if it also matches another platform's
# glob, so the same `resolver/houdini*/**/*` pattern in all three
# sections lets each per-platform archive carry the resolver binaries
# its CI worker built. (Earlier hpm versions excluded such paths from
# every archive — see 1.1.12 release notes.)
platforms = ["windows-x86_64", "linux-x86_64", "macos-universal"]

[native.windows-x86_64]
files = ["resolver/houdini*/**/*"]

[native.linux-x86_64]
files = ["resolver/houdini*/**/*"]

[native.macos-universal]
files = ["resolver/houdini*/**/*"]
