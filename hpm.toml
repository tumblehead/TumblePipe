[package]
path = "tumblehead/tumblepipe"
name = "TumblePipe"
version = "1.33.1"
description = "A small studio pipeline for animation and VFX projects in Houdini"
readme = "README.md"
documentation = "https://tumblepipe.readthedocs.io"
keywords = ["houdini"]

[compat]
# Cargo-style version requirement with an EXCLUSIVE upper bound. ">=21, <23"
# admits Houdini 21.x and 22.x; the cap is the first UNSUPPORTED major, not
# the last supported one. (The pre-Manifest-2.0 form `max_version = "22"`
# compiled to `houdini_version < '22'` and silently disabled the entire
# package on every 22.x build — that was the H22 "package not registering"
# bug.) Bump the upper bound to "<24" only once the CI matrix actually
# builds a houdini23 resolver — see resolver-src/houdini_majors.toml and the
# per-platform HPM_HOUDINI_MAJORS in .woodpecker/build-*.yml — otherwise users
# on the new major install cleanly and then hit a runtime failure when USD's
# plugin registry can't find a matching resolver/houdini<major>/ tree.
houdini = ">=21, <23"

# Native platforms this package ships a resolver binary for. Each
# per-platform CI worker (.woodpecker/build-<os>.yml) builds only its own
# platform's resolver into resolver/houdini<major>/ and packs with
# `hpm pack --platform <id>`. The macOS worker cross-compiles arm64 only
# (-DCMAKE_OSX_ARCHITECTURES=arm64) on an x86_64 host, hence macos-aarch64.
#
# No [stage.platform.<id>] place rules are needed: the release flow stages an
# allowlisted tree (.ci/_tumblepipe_build.py) that carries no .gitignore, so
# the built resolver/ tree is present at pack time and ships as common
# content at its workspace path. Per-platform staging only ever contains
# that worker's own resolver, so there is nothing cross-platform to filter.
platforms = ["windows-x86_64", "linux-x86_64", "macos-aarch64"]

[runtime]
TH_PIPELINE_PATH = { method = "set", value = "$HPM_PACKAGE_ROOT" }
ASSET_BROWSER_CATALOG_PATH = { method = "prepend", value = "$HPM_PACKAGE_ROOT/asset_browser_catalogs" }
# Read-only network-catalog entries (recipes) shipped with the package —
# scanned by tumbletrove's asset browser (> 0.9.1); older versions ignore it.
ASSET_BROWSER_NETWORK_PATH = { method = "prepend", value = "$HPM_PACKAGE_ROOT/recipes" }
TH_PROJECT_PATH = { method = "set", value = "" }
TH_CONFIG_PATH = { method = "set", value = "$TH_PROJECT_PATH/_config" }
TH_EXPORT_PATH = { method = "set", value = "$TH_PROJECT_PATH/export" }
# Pipeline user identity = the TumbleTrove account. $TT_USER_NAME passes
# through hpm verbatim (like $HOUDINI_MAJOR_RELEASE) and is expanded by
# Houdini's package loader at startup, when the Desktop launcher has already
# injected TT_USER_NAME into the process env. This is the ONLY place the
# pipeline knows about TT_USER_NAME — the Python side reads TH_USER alone.
# Outside a Desktop launch it expands to "" and attribution is blank —
# deliberately no OS-username fallback (must not leak into project files).
TH_USER = { method = "set", value = "$TT_USER_NAME" }
# Root tumbletrove's asset-browser catalog downloads (Poly Haven, AmbientCG, …)
# under the active project so library assets stay project-local:
# <project>/library/<catalog>. Read by tumbletrove > 0.16.0 (resolve_download_dir).
# With NO active project this collapses to a rootless "/library" — tumbletrove
# detects that (_is_unresolved_project_base) and falls back to ~/Downloads/<catalog>,
# so a project-less launch never writes to the drive root.
TT_DOWNLOADS_PATH = { method = "set", value = "$TH_PROJECT_PATH/library" }
# Color config is owned by the project, not the package: it ships in the
# config template (scripts/project_template/_config/ocio/) and lands at
# <project>/_config/ocio/ per project. $TH_CONFIG_PATH is set above (line 43)
# from $TH_PROJECT_PATH, and Houdini expands package vars top-to-bottom, so
# this resolves at package-load time. The Desktop launcher always launches
# with an active project, so $TH_PROJECT_PATH is a real path here (a
# project-less launch would collapse this to /_config/... — not a supported
# entry point). Keeping OCIO out of the package is also what stops it from
# fighting a legacy _pipeline OCIO source and getting pathsep-concatenated
# into an unreadable multi-path value.
OCIO = { method = "set", value = "$TH_CONFIG_PATH/ocio/tumblehead.ocio" }

# tumbleResolver registration. Houdini applies these env edits during its
# package-loading phase, *before* USD's Plug.Registry first-touches — that's
# the only timing that works in-process (Plug.Registry is a one-shot
# scanner; pythonrc.py runs too late). PATH / LD_LIBRARY_PATH /
# DYLD_LIBRARY_PATH cover the OS-specific dynamic linker so it can load
# the resolver shared library that plugInfo.json points at.
#
# Two layers of variable expansion:
#   - $HPM_PACKAGE_ROOT is consumed by hpm at pack time and rewritten to
#     a Houdini-side reference to the package install dir.
#   - $HOUDINI_MAJOR_RELEASE passes through hpm verbatim and is expanded
#     by Houdini's package loader at startup, so a single value per
#     variable routes H21 to resolver/houdini21/ and H22 to
#     resolver/houdini22/ off the same archive.
PXR_PLUGINPATH_NAME = { method = "prepend", value = "$HPM_PACKAGE_ROOT/resolver/houdini$HOUDINI_MAJOR_RELEASE/tumbleResolver/resources" }
PATH = { method = "prepend", value = "$HPM_PACKAGE_ROOT/resolver/houdini$HOUDINI_MAJOR_RELEASE/tumbleResolver/lib" }
LD_LIBRARY_PATH = { method = "prepend", value = "$HPM_PACKAGE_ROOT/resolver/houdini$HOUDINI_MAJOR_RELEASE/tumbleResolver/lib" }
DYLD_LIBRARY_PATH = { method = "prepend", value = "$HPM_PACKAGE_ROOT/resolver/houdini$HOUDINI_MAJOR_RELEASE/tumbleResolver/lib" }

[python_dependencies]
qtpy = ">=2.4.0"
watchdog = ">=6.0.0"
pymongo = ">=4.13.0"
dictdiffer = ">=0.9.0"
# Writes the farm-job hpm.toml manifest (tumblepipe.farm.deadline); tomllib's
# stdlib-recommended write companion.
tomli-w = ">=1.0"

[stage]
# Compile the native/derived artifacts before staging:
#   build-resolver — cmake-build the tumbleResolver USD plugin into
#                    resolver/houdini<major>/
#   compile-hdas   — collapse expanded otls/<name>/ dirs into otls/<name>.hda
# hpm has no native HDA collapse (verified on 0.18 — a no-prepack `hpm build`
# leaves the expanded dir untouched), so this is the script that does it.
#
# IMPORTANT: only `hpm build` and `hpm run <script>` honour prepack — `hpm
# pack` packs the workspace as-is and does NOT run it. The release flow
# therefore runs `hpm build` (which runs both prepack scripts + stages) and
# then `hpm pack` on that output; local devs get the same via `hpm build`.
#
# No per-platform [stage.platform.*].place rules: place `to` is literal (hpm
# doesn't expand wildcards in it), so `to = "resolver/houdini*/**/"` collapses
# every file onto one path and pack fails with a duplicate-filename error. The
# resolver ships as ordinary tree content instead (re-included for packing via
# .hpmignore, since resolver/ is gitignored for git hygiene).
prepack = ["build-resolver", "compile-hdas"]

# Archive contents (allowlist — mirrors .ci/_tumblepipe_build.py
# INCLUDE_PATTERNS, minus the mirror-only docs/ + .readthedocs.yaml). Without
# this, tracked-but-non-package files (keymaps, *.pref.nosave, toolbar/,
# viewer_states/, tests/, …) would ship as common content.
include = [
    "README.md",
    "LICENSE",
    "hpm.toml",
    "asset_browser_catalogs/**",
    "radial_menus/**",
    "recipes/**",
    "otls/**",
    "python/tumblepipe/**",
    "python3.11libs/**",
    "python3.13libs/**",
    "desktop/TumblePipe.desk",
    "scripts/**",
    "resources/**",
    "resolver/**",
    "resolver-src/**",
]
# Carve-outs within the included dirs.
exclude = [
    "otls/*/**",                 # decompiled HDA source dirs — ship the .hda, not the source
    "scripts/verify_*.py",       # in-app verification harnesses — dev-only, not shipped
    "**/__pycache__/**",         # bytecode: the project_template scaffold accumulates it,
                                 # and tt_setup copies _config/ wholesale into a new project
]

# build-resolver ports the cmake loop + arch/symbol verification out of the
# three .woodpecker/build-*.yml files into one script. A [scripts] `when`
# only supports the `os` axis, so the per-Houdini-major loop lives inside the
# script (driven by $HPM_HOUDINI_MAJORS, else resolver-src/houdini_majors.toml).
[scripts.build-resolver]
cmd = [
    { when = { os = "windows" }, set = "python .ci/build_resolver.py --platform windows-x86_64" },
    { when = { os = "linux" }, set = "python .ci/build_resolver.py --platform linux-x86_64" },
    { when = { os = "macos" }, set = "python .ci/build_resolver.py --platform macos-aarch64" },
]
python = "3.11"

# compile-hdas collapses expanded HDA dirs to binary .hda in place, NON-
# destructively (leaves the tracked source dirs; [stage].exclude drops them
# from the archive). os-agnostic, but uses the conditional form for parity.
[scripts.compile-hdas]
cmd = [
    { when = { os = "windows" }, set = "python .ci/compile_hdas.py" },
    { when = { os = "linux" }, set = "python .ci/compile_hdas.py" },
    { when = { os = "macos" }, set = "python .ci/compile_hdas.py" },
]
python = "3.11"

# tt_setup runs when the user clicks Configure on the package card in
# TumbleTrove. It launches a Qt6 wizard that either points at an existing
# project or scaffolds a new one from scripts/project_template/, then
# emits {"envVars": {"TH_PROJECT_PATH": ...}} on stdout.
#
# The table form opts the script into a uv-managed venv resolved on demand,
# so we don't have to assume PySide6 (or even a `python` interpreter) exists
# on the user's PATH. Python is pinned to the version Houdini 21 ships
# (`python3.11libs/`); the wizard runs out-of-process so this is independent
# of the interpreter inside any given Houdini.
[scripts.tt_setup]
cmd = "python scripts/tt_setup.py"
python = "3.11"
requirements = ["PySide6>=6.6"]

# migrate-config brings a project's _config layout forward to the current
# version (tumblepipe.migration). It targets $TH_PROJECT_PATH, so it is meant
# to be run from the desktop launcher's per-project Scripts panel: a user
# adopting a new pipeline version clicks Run to update their own project. It
# writes a config_convention.py.bak first and is idempotent. The migration
# module is stdlib-only and Houdini-free, so the table form's uv-managed
# python runs it anywhere (and dodges the Windows bare-`python` 9009 gotcha).
#
# label/description are what make the launcher list this in the per-project
# Scripts panel — the desktop surfaces only scripts that carry a label, so
# the unlabeled build/lifecycle scripts (build-resolver, compile-hdas,
# tt_setup) stay hidden from users. Supported since hpm 0.23 (deployed
# HPM_VERSION is v0.25).
[scripts.migrate-config]
cmd = "python scripts/migrate_config.py"
python = "3.11"
label = "Migrate Project Config"
description = "Bring this project's _config layout up to the current pipeline version"

# Operator index. Declares every HDA node type this package bundles so
# `hpm pack` can emit a searchable asset index for registry-level node
# discovery without downloading the archive. Generated from the otls/
# expanded-HDA INDEX__SECTION + Tools.shelf (.ci/gen_operators.py is the
# generator); regenerate when operators are added, removed, or retyped.
# `source` is the collapsed otls/<name>.hda that compile-hdas produces at
# pack time (Recipes.hda ships as a tracked binary). `icon` is omitted:
# hpm's icon is a Houdini icon identifier, but ours are
# $TH_PIPELINE_PATH/resources/*.png paths. The same namespaced type_name in
# two tables (e.g. th::cache::1.0 as both Sop and Lop) is two operators.

